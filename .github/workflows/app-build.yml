name: Build runnable app

on:
  workflow_dispatch:
  push:
    branches: [main]

# Produces a simulator .app you can run interactively in a browser via
# Appetize.io — no local Xcode, no Apple account, no Mac required on your end.
jobs:
  build-app:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build simulator app
        run: |
          if xcodebuild build \
            -project GentleWake.xcodeproj \
            -scheme GentleWake \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO > xcodebuild-sim.log 2>&1; then
            tail -20 xcodebuild-sim.log
          else
            tail -200 xcodebuild-sim.log; exit 1
          fi

      - name: Zip the .app
        run: |
          APP="build/Build/Products/Release-iphonesimulator/GentleWake.app"
          if [ ! -d "$APP" ]; then echo "No .app produced"; exit 1; fi
          cd "$(dirname "$APP")"
          zip -r -y -q "$GITHUB_WORKSPACE/GentleWake-sim.zip" "GentleWake.app"
          echo "Zipped: $(du -h "$GITHUB_WORKSPACE/GentleWake-sim.zip" | cut -f1)"

      - name: Upload runnable app
        uses: actions/upload-artifact@v4
        with:
          name: GentleWake-sim-app
          path: GentleWake-sim.zip
          if-no-files-found: error

  # Unsigned device .ipa for sideloading the trimmed (Lite) build onto a
  # physical iPhone with a free Apple ID via Sideloadly/AltStore.
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build unsigned device app (Lite)
        run: |
          if xcodebuild build \
            -project GentleWake.xcodeproj \
            -scheme GentleWakeLite \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" > xcodebuild-ipa.log 2>&1; then
            tail -20 xcodebuild-ipa.log
          else
            tail -200 xcodebuild-ipa.log; exit 1
          fi

      - name: Package unsigned .ipa
        run: |
          APP="build/Build/Products/Release-iphoneos/GentleWakeLite.app"
          if [ ! -d "$APP" ]; then echo "No device .app produced"; exit 1; fi
          rm -rf Payload && mkdir Payload
          cp -R "$APP" "Payload/GentleWakeLite.app"
          zip -r -q GentleWake-Lite-unsigned.ipa Payload
          echo "IPA: $(du -h GentleWake-Lite-unsigned.ipa | cut -f1)"

      - name: Upload unsigned .ipa
        uses: actions/upload-artifact@v4
        with:
          name: GentleWake-Lite-ipa
          path: GentleWake-Lite-unsigned.ipa
          if-no-files-found: error
