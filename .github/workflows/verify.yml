name: Build & Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify on ${{ matrix.size }} iPhone
    runs-on: macos-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # Preference-ordered candidates; the first available simulator wins.
          - size: smallest
            candidates: '["iPhone SE (3rd generation)", "iPhone 16e", "iPhone 16"]'
          - size: largest
            candidates: '["iPhone 17 Pro Max", "iPhone 16 Pro Max", "iPhone 15 Pro Max"]'
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen chargepoint/xcparse/xcparse

      - name: Generate project
        run: xcodegen generate

      - name: Pick simulator
        id: sim
        run: |
          xcrun simctl list devices available -j > sims.json
          PICK=$(python3 - <<'EOF'
          import json
          candidates = json.loads('${{ matrix.candidates }}')
          sims = json.load(open("sims.json"))
          # (runtime, name) -> udid, newest runtime first so name collisions
          # across iOS versions resolve to the most recent simulator.
          def runtime_key(rt):
              return [int(p) for p in rt.rsplit(".", 1)[-1].replace("iOS-", "").split("-") if p.isdigit()]
          entries = []
          for rt, devs in sims["devices"].items():
              if "iOS" not in rt:
                  continue
              for d in devs:
                  if d.get("isAvailable"):
                      entries.append((runtime_key(rt), d["name"], d["udid"]))
          entries.sort(key=lambda e: e[0], reverse=True)
          for c in candidates:
              for _, name, udid in entries:
                  if name == c:
                      print(f"{name}|{udid}")
                      raise SystemExit
          for _, name, udid in entries:
              if name.startswith("iPhone"):
                  print(f"{name}|{udid}")
                  raise SystemExit
          EOF
          )
          if [ -z "$PICK" ]; then echo "No iPhone simulator available"; exit 1; fi
          NAME="${PICK%%|*}"; UDID="${PICK##*|}"
          echo "Using simulator: $NAME ($UDID)"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Force light appearance for screenshots
        run: |
          # The app is appearance-adaptive; the light minimalist look is the
          # primary design, so screenshot it in light. (Dark still ships.)
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" 2>/dev/null || true
          sleep 3
          xcrun simctl ui "${{ steps.sim.outputs.udid }}" appearance light || true

      - name: Build and run screenshot tests
        run: |
          if xcodebuild test \
            -project GentleWake.xcodeproj \
            -scheme GentleWake \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            > xcodebuild.log 2>&1; then
            tail -60 xcodebuild.log
          else
            tail -500 xcodebuild.log
            exit 1
          fi

      - name: Extract screenshots
        if: always()
        run: |
          mkdir -p screenshots
          xcparse attachments TestResults.xcresult screenshots || true
          ls -la screenshots || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.size }}
          path: screenshots/
          if-no-files-found: warn

      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.size }}
          path: |
            TestResults.xcresult
            xcodebuild.log
