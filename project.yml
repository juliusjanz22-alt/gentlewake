name: GentleWake
options:
  bundleIdPrefix: com.placeholder
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  GentleWake:
    type: application
    platform: iOS
    sources:
      - path: GentleWake
        excludes:
          - "Info.plist"
    dependencies:
      - target: GentleWakeWidgets
        embed: true
    info:
      path: GentleWake/Info.plist
      properties:
        CFBundleDisplayName: GentleWake
        UILaunchScreen: {}
        UIUserInterfaceStyle: Automatic
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Keeps the audio session (and the fade-in engine) alive while the
        # device is locked during the sleep window.
        UIBackgroundModes: [audio]
        NSSupportsLiveActivities: true
  GentleWakeWidgets:
    type: app-extension
    platform: iOS
    sources:
      - GentleWakeWidgets
      - GentleWake/Shared
    info:
      path: GentleWakeWidgets/Info.plist
      properties:
        CFBundleDisplayName: GentleWake Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        SKIP_INSTALL: YES
        # Extension bundle IDs must be children of the host app's ID.
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.GentleWake.widgets
  GentleWakeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - GentleWakeUITests
    dependencies:
      - target: GentleWake
schemes:
  GentleWake:
    build:
      targets:
        GentleWake: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GentleWakeUITests
