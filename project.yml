name: GentleWake
options:
  bundleIdPrefix: com.placeholder
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  GentleWake:
    type: application
    platform: iOS
    sources:
      - GentleWake
    dependencies:
      - target: GentleWakeWidgets
        embed: true
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: GentleWake/GentleWake.entitlements
    info:
      path: GentleWake/Info.plist
      properties:
        CFBundleDisplayName: GentleWake
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Keeps the audio session (and thus the fade-in engine) alive while
        # the device is locked during the sleep window — the same approach
        # the source app's 3-tier architecture implies.
        UIBackgroundModes: [audio]
        NSSupportsLiveActivities: true
        NSHealthShareUsageDescription: Reads your sleep data to refine the sleep gate and show your real sleep trend.
        NSHealthUpdateUsageDescription: Saves nights recorded by the app to Apple Health.
        NSHomeKitUsageDescription: Controls your bedroom lights for the smart light sunrise during the alarm fade-in.
  GentleWakeWidgets:
    type: app-extension
    platform: iOS
    sources:
      - GentleWakeWidgets
      - GentleWake/Shared
    info:
      path: GentleWakeWidgets/Info.plist
      properties:
        CFBundleDisplayName: GentleWake Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        SKIP_INSTALL: YES
        # Extension bundle IDs must be children of the host app's ID or the
        # app fails to install on the simulator.
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.GentleWake.widgets
  GentleWakeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - GentleWakeUITests
    dependencies:
      - target: GentleWake
schemes:
  GentleWake:
    build:
      targets:
        GentleWake: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GentleWakeUITests
