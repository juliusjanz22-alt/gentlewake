name: GentleWake
options:
  bundleIdPrefix: com.placeholder
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  GentleWake:
    type: application
    platform: iOS
    sources:
      - GentleWake
    info:
      path: GentleWake/Info.plist
      properties:
        CFBundleDisplayName: GentleWake
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Keeps the audio session (and thus the fade-in engine) alive while
        # the device is locked during the sleep window — the same approach
        # the source app's 3-tier architecture implies.
        UIBackgroundModes: [audio]
  GentleWakeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - GentleWakeUITests
    dependencies:
      - target: GentleWake
schemes:
  GentleWake:
    build:
      targets:
        GentleWake: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GentleWakeUITests
