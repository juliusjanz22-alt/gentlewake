name: GentleWake
options:
  bundleIdPrefix: com.placeholder
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  GentleWake:
    type: application
    platform: iOS
    sources:
      - GentleWake
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: GentleWake
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
  GentleWakeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - GentleWakeUITests
    dependencies:
      - target: GentleWake
schemes:
  GentleWake:
    build:
      targets:
        GentleWake: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GentleWakeUITests
