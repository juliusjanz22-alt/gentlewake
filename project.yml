name: GentleWake
options:
  bundleIdPrefix: com.placeholder
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  GentleWake:
    type: application
    platform: iOS
    sources:
      - path: GentleWake
        excludes:
          - "Info.plist"
          - "Info-Lite.plist"
          - "GentleWake.entitlements"
    dependencies:
      - target: GentleWakeWidgets
        embed: true
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: GentleWake/GentleWake.entitlements
    info:
      path: GentleWake/Info.plist
      properties:
        CFBundleDisplayName: GentleWake
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Keeps the audio session (and thus the fade-in engine) alive while
        # the device is locked during the sleep window — the same approach
        # the source app's 3-tier architecture implies.
        UIBackgroundModes: [audio]
        NSSupportsLiveActivities: true
        NSHealthShareUsageDescription: Reads your sleep data to refine the sleep gate and show your real sleep trend.
        NSHealthUpdateUsageDescription: Saves nights recorded by the app to Apple Health.
        NSHomeKitUsageDescription: Controls your bedroom lights for the smart light sunrise during the alarm fade-in.
  # Trimmed build for free-provisioning sideloading onto a physical iPhone:
  # no widget extension, no HealthKit/HomeKit entitlements (a free Apple ID
  # can't sign them). Background audio + local notifications — the core
  # gradual-wake experience — are allowed on free provisioning and stay in.
  GentleWakeLite:
    type: application
    platform: iOS
    sources:
      - path: GentleWake
        excludes:
          - "Shared/**"
          - "Info.plist"
          - "Info-Lite.plist"
          - "GentleWake.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.GentleWakeLite
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: LITE
    info:
      path: GentleWake/Info-Lite.plist
      properties:
        CFBundleDisplayName: GentleWake
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIBackgroundModes: [audio]
  GentleWakeWidgets:
    type: app-extension
    platform: iOS
    sources:
      - GentleWakeWidgets
      - GentleWake/Shared
    info:
      path: GentleWakeWidgets/Info.plist
      properties:
        CFBundleDisplayName: GentleWake Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        SKIP_INSTALL: YES
        # Extension bundle IDs must be children of the host app's ID or the
        # app fails to install on the simulator.
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.GentleWake.widgets
  GentleWakeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - GentleWakeUITests
    dependencies:
      - target: GentleWake
schemes:
  GentleWake:
    build:
      targets:
        GentleWake: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GentleWakeUITests
  GentleWakeLite:
    build:
      targets:
        GentleWakeLite: all
    run:
      config: Release
